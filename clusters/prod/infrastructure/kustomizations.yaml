apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-cilium
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/prod/infrastructure/cilium
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-metallb
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/prod/infrastructure/metallb
  prune: true
  wait: true
  dependsOn:
    - name: infra-cilium
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-metallb-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/prod/infrastructure/metallb-config
  prune: true
  dependsOn:
    - name: infra-metallb
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-traefik
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/prod/infrastructure/traefik
  prune: true
  dependsOn:
    - name: infra-metallb-config
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-cert-manager
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/prod/infrastructure/cert-manager
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-cert-manager-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/prod/infrastructure/cert-manager-config
  prune: true
  dependsOn:
    - name: infra-cert-manager
  sourceRef:
    kind: GitRepository
    name: flux-system