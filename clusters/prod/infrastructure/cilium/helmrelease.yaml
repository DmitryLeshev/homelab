apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: "1.17.*"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  values:
    kubeProxyReplacement: true
    k8sServiceHost: 10.10.30.14
    k8sServicePort: 6443
    bpf:
      masquerade: true
    enableIPv4Masquerade: true
    routingMode: tunnel
    tunnelProtocol: vxlan
    ipam:
      mode: kubernetes