apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami
  namespace: default
spec:
  tls:
    - hosts:
        - whoami.24lesh.ru
      secretName: wildcard-24lesh-ru-tls
  rules:
    - host: whoami.24lesh.ru
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whoami
                port:
                  number: 80